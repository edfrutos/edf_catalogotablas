version: '3.9'

services:
  # ============================================================
  # MongoDB - Base de datos principal
  # ============================================================
  mongodb:
    image: mongo:7.0-alpine
    container_name: edf_catalogotablas_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_me_in_production}
      MONGO_INITDB_DATABASE: edf_catalogotablas
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edf_network

  # ============================================================
  # Redis - Sesiones y caching
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: edf_catalogotablas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me_in_production}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edf_network

  # ============================================================
  # EDF Catálogo de Tablas - Flask Web Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: production
    container_name: edf_catalogotablas_app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Flask Configuration
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: wsgi.py
      SECRET_KEY: ${SECRET_KEY:?ERROR: SECRET_KEY must be set in .env}
      
      # MongoDB Configuration
      MONGO_URI: mongodb://admin:${MONGO_ROOT_PASSWORD:-change_me_in_production}@mongodb:27017/edf_catalogotablas?authSource=admin
      
      # Redis Configuration (if using)
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_in_production}@redis:6379/0
      
      # Application Configuration
      HOST: 0.0.0.0
      PORT: 5002
      UPLOAD_FOLDER: /app/uploads
      LOG_DIR: /app/logs
      
      # AWS S3 (Optional)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      USE_S3: ${USE_S3:-false}
      
      # Email Configuration (Optional)
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      
      # Emergency Access (Development Only)
      EMERGENCY_TOKEN: ${EMERGENCY_TOKEN:-}
      
      # Security Headers
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_HTTPONLY: ${SESSION_COOKIE_HTTPONLY:-true}
      
    ports:
      - "${APP_PORT:-5002}:5002"
    
    volumes:
      - ./app/static/uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
    
    healthcheck:
      test: curl -f http://localhost:5002/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - edf_network
    
    labels:
      com.example.description: "EDF Catálogo de Tablas - Flask Application"
      com.example.version: "1.0.0"

# ============================================================
# Networks
# ============================================================
networks:
  edf_network:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
